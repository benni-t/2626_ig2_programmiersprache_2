<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>SVG-Grundlagen</title>
</head>

<body>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .svg-container {
      width: 50vw;
      height: 50vw;
    }

    svg {
      background-color: lightgray;
    }
  </style>

  <div class="svg-container">
    <svg viewBox="0 0 1000 1000">
      <g transform="translate(400, 100)">
        <polygon points="0,0 200,0 150,75 50,75" fill="#0085ff"></polygon>
        <polygon points="50,75 150,75 200,150 0,150" fill="#FF5A33"></polygon>
        <polygon points="0,0 50,75 0,150" fill="#FFEC5C"></polygon>
        <polygon points="200,0 200,150 150,75" fill="#FFEC5C"></polygon>
      </g>

      <g transform="translate(400, 400)">
        <polygon points="100,100 100,0 0,100" fill="#0085ff"></polygon>
        <polygon points="100,0 200,100 100,100" fill="#FF5A33"></polygon>
        <polygon points="100,100 200,100 100,200" fill="#0085ff"></polygon>
        <polygon points="0,100 100,100 100,200" fill="#FF5A33"></polygon>
      </g>

      <g transform="translate(400, 900)">
        <g>
          <polygon points="0,0 50,0 125,-75 75,-75" fill="#0085ff"></polygon>
          <polygon points="75,-75 125,-75 50,-150 0,-150" fill="#FF5A33"></polygon>
        </g>
        <g transform="translate(50, 0)">
          <polygon points="0,0 50,0 125,-75 75,-75" fill="#FF5A33"></polygon>
          <polygon points="75,-75 125,-75 50,-150 0,-150" fill="#0085ff"></polygon>
        </g>
        <g transform="translate(100, 0)">
          <polygon points="0,0 50,0 125,-75 75,-75" fill="#0085ff"></polygon>
          <polygon points="75,-75 125,-75 50,-150 0,-150" fill="#FF5A33"></polygon>
        </g>
      </g>
    </svg>
  </div>
</body>

</html>
